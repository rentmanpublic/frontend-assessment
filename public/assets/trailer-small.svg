  <path d="M10 20 L105 20 L130 38" fill="none" stroke="#c8c8c8" stroke-width="1"/>
  <!-- Rear door -->
  <rect x="10" y="28" width="22" height="37" rx="2" fill="#e8e8e8" stroke="#c0c0c0" stroke-width="1"/>
  <line x1="21" y1="28" x2="21" y2="65" stroke="#d0d0d0" stroke-width="0.8"/>
  <circle cx="18" cy="47" r="1.5" fill="#a0a0a0"/>
  <circle cx="24" cy="47" r="1.5" fill="#a0a0a0"/>
  <!-- Side windows -->
  <rect x="70" y="24" width="18" height="16" rx="2" fill="#a8d0f0" stroke="#7ab0d8" stroke-width="1"/>
  <rect x="92" y="28" width="18" height="14" rx="2" fill="#a8d0f0" stroke="#7ab0d8" stroke-width="1"/>
