  <path d="M112 30 L125 38 L125 52 L112 52 Z" fill="#a8d0f0" stroke="#7ab0d8" stroke-width="1" stroke-linejoin="round"/>
  <!-- Headlight -->
  <rect x="128" y="48" width="4" height="7" rx="1.5" fill="#ffe066" stroke="#d4a800" stroke-width="0.8"/>
  <!-- Side mirror -->
  <rect x="130" y="34" width="5" height="4" rx="1" fill="#c0c8d0" stroke="#a0a8b0" stroke-width="0.8"/>
  <!-- Bumper -->
  <rect x="10" y="65" width="124" height="4" rx="1.5" fill="#d0d0d0" stroke="#b0b0b0" stroke-width="1"/>
  <!-- Rear wheel -->
  <circle cx="38" cy="72" r="10" fill="#505050"/>
  <circle cx="38" cy="72" r="6" fill="#707070"/>
  <circle cx="38" cy="72" r="2.5" fill="#909090"/>
  <!-- Front wheel -->
  <circle cx="108" cy="72" r="10" fill="#505050"/>
  <circle cx="108" cy="72" r="6" fill="#707070"/>
  <circle cx="108" cy="72" r="2.5" fill="#909090"/>
