<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100">
  <!-- Cargo body -->
  <rect x="8" y="18" width="100" height="52" rx="4" fill="#f5f5f5" stroke="#c0c0c0" stroke-width="1.5"/>
  <line x1="38" y1="18" x2="38" y2="70" stroke="#d8d8d8" stroke-width="1"/>
  <line x1="68" y1="18" x2="68" y2="70" stroke="#d8d8d8" stroke-width="1"/>
  <!-- Cargo door lines -->
  <rect x="8" y="18" width="100" height="6" rx="4" fill="#e8e8e8" stroke="#c0c0c0" stroke-width="1"/>
  <!-- Cabin -->
  <path d="M108 30 L108 70 L145 70 L145 42 L130 30 Z" fill="#e0e8f0" stroke="#a0a8b0" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Windshield -->
  <path d="M120 33 L130 33 L142 44 L142 52 L120 52 Z" fill="#a8d0f0" stroke="#7ab0d8" stroke-width="1" stroke-linejoin="round"/>
  <!-- Headlight -->
  <rect x="143" y="55" width="4" height="8" rx="1.5" fill="#ffe066" stroke="#d4a800" stroke-width="0.8"/>
  <!-- Side mirror -->
  <rect x="146" y="38" width="6" height="4" rx="1" fill="#c0c8d0" stroke="#a0a8b0" stroke-width="0.8"/>
  <!-- Bumper -->
  <rect x="8" y="70" width="140" height="5" rx="2" fill="#d0d0d0" stroke="#b0b0b0" stroke-width="1"/>
  <!-- Rear wheel -->
  <circle cx="35" cy="78" r="12" fill="#505050"/>
  <circle cx="35" cy="78" r="7" fill="#707070"/>
  <circle cx="35" cy="78" r="3" fill="#909090"/>
  <!-- Front wheel -->
  <circle cx="125" cy="78" r="12" fill="#505050"/>
  <circle cx="125" cy="78" r="7" fill="#707070"/>
  <circle cx="125" cy="78" r="3" fill="#909090"/>
  <!-- Mud flaps -->
  <rect x="20" y="70" width="3" height="8" rx="1" fill="#808080"/>
  <rect x="110" y="70" width="3" height="8" rx="1" fill="#808080"/>
</svg>
